services:
  postgres:
    image: postgres:16-alpine
    container_name: eescola_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eescola
    ports:
      - "5432:5432"
    volumes:
      - eescola_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eescola"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eescola_pgdata:
